<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IChat - Real-Time</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="join-panel" class="panel join-panel">
        <h1>IChat</h1>
        <p class="subtitle">Fast, intentional, user-controlled conversation.</p>

        <label for="username-input">Username</label>
        <input id="username-input" type="text" maxlength="20" placeholder="Enter username" />

        <label for="category-select">Your circle</label>
        <select id="category-select">
          <option value="close_friends">Close Friends</option>
          <option value="friends">Friends</option>
          <option value="others">Others</option>
        </select>

        <label for="focus-select">Why are you here?</label>
        <select id="focus-select">
          <option value="chat_with_friends">Chat with friends</option>
          <option value="ask_a_question">Ask a question</option>
          <option value="just_browsing">Just browsing</option>
        </select>

        <p id="join-error" class="error"></p>
        <button id="join-btn">Join Chat</button>
      </section>

      <section id="chat-panel" class="panel chat-panel hidden">
        <aside class="sidebar">
          <h2>Online Users</h2>
          <ul id="users-list"></ul>
        </aside>

        <section class="chat-main">
          <header class="chat-header">
            <h2>Room Feed</h2>
            <span id="focus-badge" class="badge"></span>
          </header>

          <div id="messages" class="messages"></div>
          <p id="typing-indicator" class="typing-indicator"></p>

          <form id="message-form" class="message-form">
            <input id="message-input" type="text" placeholder="Write a message..." autocomplete="off" />
            <button type="submit">Send</button>
          </form>
        </section>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="./client.js"></script>
  </body>
</html>
